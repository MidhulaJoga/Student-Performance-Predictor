<!DOCTYPE html>
<html>
<head>
    <title>Dashboard | Student Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="nav">
    Student Performance Dashboard
</div>

<div class="container">

    <h2>Enter Academic Details</h2>

    <form action="/predict" method="post">
        <input type="number" name="attendance" placeholder="Attendance (%)" required>
        <input type="number" step="0.1" name="study_hours" placeholder="Study Hours per Day" required>
        <input type="number" name="previous_marks" placeholder="Previous Marks (%)" required>
        <button type="submit">Predict Result</button>
    </form>

    {% if prediction %}
        <hr style="margin:20px 0;">

        <h3 class="{{ 'result-pass' if prediction == 'Pass' else 'result-fail' }}">
            Final Prediction: {{ prediction }}
        </h3>
    {% endif %}

</div>

</body>
</html>
